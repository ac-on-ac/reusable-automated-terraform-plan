name: Terraform Plan

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory containing the Terraform configuration. Defaults to the repository root."
        required: false
        type: string
        default: '.'
      terraform_version:
        description: "Version of Terraform to install (e.g. 1.11.0). Defaults to latest."
        required: false
        type: string
        default: 'latest'
      terraform_vars:
        description: >
          Optional newline-separated KEY=VALUE pairs exported as environment
          variables before the plan runs. Only TF_VAR_* keys are permitted.
        required: false
        type: string
        default: ''
      aws_region:
        description: "AWS region for AWS login and the default region for the S3 backend. Defaults to us-east-1."
        required: false
        type: string
        default: 'us-east-1'

      # Azure OIDC — supply these three instead of azure_credentials to authenticate via OIDC.
      # The calling workflow must also declare: permissions: id-token: write
      azure_client_id:
        description: "Azure client (application) ID for OIDC authentication."
        required: false
        type: string
        default: ''
      azure_tenant_id:
        description: "Azure tenant ID for OIDC authentication."
        required: false
        type: string
        default: ''
      azure_subscription_id:
        description: "Azure subscription ID for OIDC authentication."
        required: false
        type: string
        default: ''

      # Azure blob storage backend
      azure_backend_resource_group_name:
        description: "Resource group containing the Azure Storage Account used for Terraform state."
        required: false
        type: string
        default: ''
      azure_backend_storage_account_name:
        description: "Azure Storage Account name for Terraform state."
        required: false
        type: string
        default: ''
      azure_backend_container_name:
        description: "Azure Blob Storage container name for Terraform state."
        required: false
        type: string
        default: ''
      azure_backend_key:
        description: "Blob name (path) for the Terraform state file within the container."
        required: false
        type: string
        default: ''

      # S3 backend
      s3_backend_bucket:
        description: "S3 bucket name for Terraform state."
        required: false
        type: string
        default: ''
      s3_backend_key:
        description: "S3 object key (path) for the Terraform state file."
        required: false
        type: string
        default: ''
      s3_backend_region:
        description: "AWS region of the S3 bucket. Defaults to aws_region when not set."
        required: false
        type: string
        default: ''
      s3_backend_dynamodb_table:
        description: "DynamoDB table name for Terraform state locking (optional)."
        required: false
        type: string
        default: ''

    secrets:
      # Azure
      azure_credentials:
        required: false
      databricks_host:
        required: false
      databricks_azure_workspace_resource_id:
        required: false
      # Terraform Cloud / Enterprise
      terraform_token:
        required: false
      # AWS
      aws_access_key_id:
        required: false
      aws_secret_access_key:
        required: false
      aws_role_to_assume:
        required: false
      # GitHub
      gh_token:
        required: false
      # HashiCorp Vault
      vault_url:
        required: false
      vault_token:
        required: false
      vault_role_id:
        required: false
      vault_secret_id:
        required: false
      # Snowflake
      snowflake_account:
        required: false
      snowflake_user:
        required: false
      snowflake_password:
        required: false
      snowflake_role:
        required: false
      # Grafana
      grafana_url:
        required: false
      grafana_auth:
        required: false

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.terraform_token }}
      TFE_TOKEN: ${{ secrets.terraform_token }}
      AZURE_CREDENTIALS: ${{ secrets.azure_credentials }}
      AZURE_CLIENT_ID: ${{ inputs.azure_client_id }}
      DATABRICKS_HOST: ${{ secrets.databricks_host }}
      DATABRICKS_AZURE_RESOURCE_ID: ${{ secrets.databricks_azure_workspace_resource_id }}
      AWS_ACCESS_KEY_ID: ${{ secrets.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret_access_key }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.aws_role_to_assume }}
      GITHUB_TOKEN_PROVIDER: ${{ secrets.gh_token }}
      VAULT_URL: ${{ secrets.vault_url }}
      VAULT_TOKEN: ${{ secrets.vault_token }}
      VAULT_ROLE_ID: ${{ secrets.vault_role_id }}
      VAULT_SECRET_ID: ${{ secrets.vault_secret_id }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.snowflake_account }}
      SNOWFLAKE_USER: ${{ secrets.snowflake_user }}
      SNOWFLAKE_PASSWORD: ${{ secrets.snowflake_password }}
      SNOWFLAKE_ROLE: ${{ secrets.snowflake_role }}
      GRAFANA_URL: ${{ secrets.grafana_url }}
      GRAFANA_AUTH: ${{ secrets.grafana_auth }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate working_directory
        run: |
          resolved=$(realpath -m "$WORKING_DIR")
          repo_root=$(realpath "$GITHUB_WORKSPACE")
          if [[ "$resolved" != "$repo_root" && "$resolved" != "$repo_root/"* ]]; then
            echo "::error::working_directory '$WORKING_DIR' resolves outside the repository root."
            exit 1
          fi
          if [ ! -d "$resolved" ]; then
            echo "::error::working_directory '$WORKING_DIR' does not exist."
            exit 1
          fi
        env:
          WORKING_DIR: ${{ inputs.working_directory }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Azure Login (service principal)
        if: env.AZURE_CREDENTIALS != '' && env.AZURE_CLIENT_ID == ''
        uses: azure/login@v3
        with:
          creds: ${{ secrets.azure_credentials }}

      - name: Azure Login (OIDC)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@v3
        with:
          client-id: ${{ inputs.azure_client_id }}
          tenant-id: ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: AWS Login
        if: env.AWS_ACCESS_KEY_ID != '' || env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.aws_access_key_id }}
          aws-secret-access-key: ${{ secrets.aws_secret_access_key }}
          role-to-assume: ${{ secrets.aws_role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: HashiCorp Vault Login
        if: env.VAULT_URL != '' && (env.VAULT_TOKEN != '' || (env.VAULT_ROLE_ID != '' && env.VAULT_SECRET_ID != ''))
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.vault_url }}
          token: ${{ secrets.vault_token }}
          roleId: ${{ secrets.vault_role_id }}
          secretId: ${{ secrets.vault_secret_id }}

      - name: Set Terraform variables
        if: inputs.terraform_vars != ''
        env:
          TERRAFORM_VARS: ${{ inputs.terraform_vars }}
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue
            key="${line%%=*}"
            if [[ "$key" != TF_VAR_* ]]; then
              echo "::error::terraform_vars contains disallowed key '$key'. Only TF_VAR_* keys are permitted."
              exit 1
            fi
            echo "$line" >> $GITHUB_ENV
          done <<< "$TERRAFORM_VARS"

      - name: Validate backend inputs
        env:
          AZURE_BACKEND_RG: ${{ inputs.azure_backend_resource_group_name }}
          AZURE_BACKEND_SA: ${{ inputs.azure_backend_storage_account_name }}
          AZURE_BACKEND_CONTAINER: ${{ inputs.azure_backend_container_name }}
          AZURE_BACKEND_KEY: ${{ inputs.azure_backend_key }}
          S3_BACKEND_BUCKET: ${{ inputs.s3_backend_bucket }}
          S3_BACKEND_KEY: ${{ inputs.s3_backend_key }}
        run: |
          if [ -n "$AZURE_BACKEND_RG" ]; then
            missing=()
            [ -z "$AZURE_BACKEND_SA" ]        && missing+=(azure_backend_storage_account_name)
            [ -z "$AZURE_BACKEND_CONTAINER" ] && missing+=(azure_backend_container_name)
            [ -z "$AZURE_BACKEND_KEY" ]        && missing+=(azure_backend_key)
            if [ ${#missing[@]} -gt 0 ]; then
              echo "::error::Azure backend is partially configured. Missing: ${missing[*]}"
              exit 1
            fi
          fi
          if [ -n "$S3_BACKEND_BUCKET" ] && [ -z "$S3_BACKEND_KEY" ]; then
            echo "::error::s3_backend_key must be provided when s3_backend_bucket is set."
            exit 1
          fi

      - name: Terraform Init
        env:
          WORKING_DIR: ${{ inputs.working_directory }}
          AZURE_BACKEND_RG: ${{ inputs.azure_backend_resource_group_name }}
          AZURE_BACKEND_SA: ${{ inputs.azure_backend_storage_account_name }}
          AZURE_BACKEND_CONTAINER: ${{ inputs.azure_backend_container_name }}
          AZURE_BACKEND_KEY: ${{ inputs.azure_backend_key }}
          S3_BACKEND_BUCKET: ${{ inputs.s3_backend_bucket }}
          S3_BACKEND_KEY: ${{ inputs.s3_backend_key }}
          S3_BACKEND_REGION: ${{ inputs.s3_backend_region }}
          S3_BACKEND_DYNAMODB: ${{ inputs.s3_backend_dynamodb_table }}
          AWS_REGION: ${{ inputs.aws_region }}
        run: |
          init_args=()
          if [ -n "$AZURE_BACKEND_RG" ]; then
            init_args+=(
              "-backend-config=resource_group_name=$AZURE_BACKEND_RG"
              "-backend-config=storage_account_name=$AZURE_BACKEND_SA"
              "-backend-config=container_name=$AZURE_BACKEND_CONTAINER"
              "-backend-config=key=$AZURE_BACKEND_KEY"
            )
          elif [ -n "$S3_BACKEND_BUCKET" ]; then
            region="${S3_BACKEND_REGION:-$AWS_REGION}"
            init_args+=(
              "-backend-config=bucket=$S3_BACKEND_BUCKET"
              "-backend-config=key=$S3_BACKEND_KEY"
              "-backend-config=region=$region"
            )
            [ -n "$S3_BACKEND_DYNAMODB" ] && init_args+=("-backend-config=dynamodb_table=$S3_BACKEND_DYNAMODB")
          fi
          terraform -chdir="$WORKING_DIR" init "${init_args[@]}"

      - name: Terraform Validate
        env:
          WORKING_DIR: ${{ inputs.working_directory }}
        run: terraform -chdir="$WORKING_DIR" validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          WORKING_DIR: ${{ inputs.working_directory }}
        run: |
          set +e
          terraform -chdir="$WORKING_DIR" plan -no-color -detailed-exitcode -out=tfplan 2>&1 | tee "$GITHUB_WORKSPACE/plan_output.txt"
          plan_exit_code=${PIPESTATUS[0]}
          set -e
          # Exit codes with -detailed-exitcode:
          #   0 = success, no changes
          #   1 = error
          #   2 = success, changes pending
          echo "exit_code=$plan_exit_code" >> $GITHUB_OUTPUT
          if [ "$plan_exit_code" -eq 1 ]; then
            echo "::error::Terraform plan failed."
            exit 1
          fi

      - name: Post plan as pull request comment
        uses: actions/github-script@v8
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const MARKER = '<!-- terraform-plan -->';
            const exitCode = process.env.PLAN_EXIT_CODE;

            // Exit codes from -detailed-exitcode: 0 = no changes, 1 = error (blocked above), 2 = changes pending
            const status = exitCode === '0'
              ? '✅ No changes — infrastructure is up to date.'
              : '⚠️ Changes detected — review the plan below.';

            const planFile = path.join(process.env.GITHUB_WORKSPACE, 'plan_output.txt');
            let planOutput = fs.readFileSync(planFile, 'utf8');

            const MAX_LENGTH = 60000;
            if (planOutput.length > MAX_LENGTH) {
              planOutput = planOutput.slice(0, MAX_LENGTH) + '\n\n... output truncated (exceeded 60,000 characters) ...';
            }

            const body = [
              MARKER,
              `### Terraform Plan — ${status}`,
              '',
              '<details>',
              '<summary>Show plan</summary>',
              '',
              '```',
              planOutput.trimEnd(),
              '```',
              '',
              '</details>',
              '',
              `*Workflow: \`${context.workflow}\` | Triggered by: @${context.actor} | Commit: \`${context.sha.slice(0, 7)}\`*`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
